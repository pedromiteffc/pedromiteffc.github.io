<!DOCTYPE html>
<html lang="es">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Configuración</title>

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <link rel="shortcut icon" href="favicon.png" type="image/x-icon">

    </head>

    <body>

        <div class="background-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>

        <main class="glass-container" style="max-width: 1000px;">

            <header class="header">

                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Dashboard</a>
                <div class="header-title" style="margin-top: 15px;">
                    <h1>Configuración General</h1>
                </div>

            </header>

            <div class="admin-grid">

                <div class="admin-column">

                    <section class="add-transaction">

                        <h3 id="cat-form-title">Nueva Categoría</h3>

                        <form id="admin-form-cat">

                            <div class="type-toggle">

                                <input type="radio" id="cat-type-expense" name="cat-type" value="expense" checked>
                                <label for="cat-type-expense">Gasto</label>
                                
                                <input type="radio" id="cat-type-income" name="cat-type" value="income">
                                <label for="cat-type-income">Ingreso</label>

                            </div>

                            <div class="form-control">
                                <input type="text" id="cat-name" placeholder="Nombre (Ej: Gimnasio)" required />
                            </div>

                            <div class="form-control" style="display: flex; gap: 15px;">

                                <input type="text" id="cat-icon" placeholder="Emoji (Ej: 🏋️‍♂️)" maxlength="2" required style="flex: 1;" />
                                
                                <div class="color-picker-wrapper" style="flex: 1;">
                                    <label for="cat-color" style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 5px;">Color</label>
                                    <input type="color" id="cat-color" value="#3b82f6" required style="width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer;" />
                                </div>

                            </div>

                            <button class="btn" id="cat-submit-btn">Guardar Categoría</button>
                            <button type="button" class="btn btn-cancel" id="cat-cancel-edit-btn" style="display: none;">Cancelar Edición</button>
                        
                        </form>

                    </section>

                    <section class="history-section" style="margin-top: 25px;">
                        <h3>Categorías Existentes</h3>
                        <ul id="categories-list" class="list" style="max-height: 250px;"></ul>
                    </section>

                </div>

                <div class="admin-column">

                    <section class="add-transaction">

                        <h3 id="wal-form-title">Nueva Billetera</h3>

                        <form id="admin-form-wal">

                            <div class="form-control">
                                <input type="text" id="wal-name" placeholder="Nombre (Ej: Mercado Pago)" required />
                            </div>

                            <div class="form-control">

                                <input type="url" id="wal-logo" placeholder="URL de la imagen" required />

                                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                                    
                                    <small style="color: var(--text-muted); font-size: 0.75rem;">Pega el <strong>"Enlace directo"</strong></small>
                                    <a href="https://postimages.org/es/" target="_blank" style="font-size: 0.8rem; color: #9b59b6; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 5px;">
                                        <i class="fa-solid fa-cloud-arrow-up"></i> Subir a Postimg
                                    </a>

                                </div>

                            </div>

                            <button class="btn" id="wal-submit-btn" style="background-color: #9b59b6;">Guardar Billetera</button>
                            <button type="button" class="btn btn-cancel" id="wal-cancel-edit-btn" style="display: none;">Cancelar Edición</button>
                        
                        </form>

                    </section>

                    <section class="history-section" style="margin-top: 25px;">
                        <h3>Billeteras Existentes</h3>
                        <ul id="wallets-list" class="list" style="max-height: 250px;"></ul>
                    </section>

                </div>

            </div>

        </main>

        <script src="admin.js"></script>
        
    </body>

</html>
