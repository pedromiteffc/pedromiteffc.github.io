<!DOCTYPE html>
<html lang="es">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Administrar Categorías</title>

        <link rel="stylesheet" href="style.css">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
        
    </head>

    <body>

        <div class="background-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>

        <main class="glass-container">

            <header class="header">

                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Dashboard</a>
                <div class="header-title" style="margin-top: 15px;">
                    <h1>Administrar Categorías</h1>
                </div>

            </header>

            <div class="content-grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
                
                <section class="add-transaction">

                    <h3 id="form-title">Nueva Categoría</h3>

                    <form id="admin-form">

                        <div class="type-toggle">

                            <input type="radio" id="cat-type-expense" name="cat-type" value="expense" checked>
                            <label for="cat-type-expense">Gasto</label>

                            <input type="radio" id="cat-type-income" name="cat-type" value="income">
                            <label for="cat-type-income">Ingreso</label>

                        </div>

                        <div class="form-control">
                            <input type="text" id="cat-name" placeholder="Nombre" required />
                        </div>
                        
                        <div class="form-control" style="display: flex; gap: 15px;">

                            <input type="text" id="cat-icon" placeholder="Emoji" maxlength="2" required style="flex: 1;" />

                            <div class="color-picker-wrapper" style="flex: 1;">
                                <label for="cat-color" style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 5px;">Color identificador</label>
                                <input type="color" id="cat-color" value="#3b82f6" required style="width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer;" />
                            </div>

                        </div>
                        
                        <button class="btn" id="submit-btn">Guardar Categoría</button>
                        <button type="button" class="btn btn-cancel" id="cancel-edit-btn" style="display: none;">Cancelar Edición</button>

                    </form>

                </section>

                <section class="history-section">
                    <h3>Categorías Existentes</h3>
                    <ul id="categories-list" class="list"></ul>
                </section>

            </div>

        </main>

        <script src="admin.js"></script>

    </body>

</html>
